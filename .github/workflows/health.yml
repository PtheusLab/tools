name: Scraper Health Check

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  health:
    name: Live scraper smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Scraper health check failed — ${new Date().toISOString().slice(0, 10)}`,
              body: [
                "The daily scraper health check failed.",
                "",
                "One or more scrapers may be broken due to upstream API or HTML structure changes.",
                "",
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join("\n"),
              labels: ["bug", "scraper-broken"],
            });
